services:
  # MySQL Database
  - type: web
    name: mysql-db
    env: docker
    dockerfileInline: |
      FROM mysql:5.7
      ENV MYSQL_DATABASE=spam
      ENV MYSQL_ROOT_PASSWORD=root
    plan: free
    disk:
      name: mysql-data
      mountPath: /var/lib/mysql
      sizeGB: 1

  # Java Web Application
  - type: web
    name: imail-app
    env: docker
    plan: free
    # Link the database
    envVars:
      - key: DB_HOST
        fromService:
          name: mysql-db
          type: host
      - key: DB_PORT
        value: "3306"
      - key: DB_NAME
        value: "spam"
      - key: DB_USER
        value: "root"
      - key: DB_PASS
        value: "root"
