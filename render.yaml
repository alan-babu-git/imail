services:
  # MySQL Database
  - type: web
    name: mysql-db
    runtime: image
    image: mysql:5.7
    envVars:
      - key: MYSQL_DATABASE
        value: spam
      - key: MYSQL_ROOT_PASSWORD
        value: root
    plan: free
    disk:
      name: mysql-data
      mountPath: /var/lib/mysql
      sizeGB: 1

  # Java Web Application
  - type: web
    name: imail-app
    env: docker
    plan: free
    # Link the database
    envVars:
      - key: DB_HOST
        fromService:
          name: mysql-db
          type: host
      - key: DB_PORT
        value: "3306"
      - key: DB_NAME
        value: "spam"
      - key: DB_USER
        value: "root"
      - key: DB_PASS
        value: "root"
