services:
  # MySQL Database
  - type: web
    name: mysql-db
    runtime: image
    image:
      url: mysql:5.7
    envVars:
      - key: MYSQL_DATABASE
        value: spam
      - key: MYSQL_ROOT_PASSWORD
        value: root
    plan: free

  # Java Web Application
  - type: web
    name: imail-app
    env: docker
    plan: free
    # Link the database
    envVars:
      - key: DB_HOST
        fromService:
          type: web
          name: mysql-db
          property: host
      - key: DB_PORT
        value: "3306"
      - key: DB_NAME
        value: "spam"
      - key: DB_USER
        value: "root"
      - key: DB_PASS
        value: "root"
